# Reusable Go CI workflow — called by all per-component CI workflows.
# Provides lint, test, and build steps with a configurable working directory.
name: Go CI (Reusable)

on:
  workflow_call:
    inputs:
      working-directory:
        description: "Directory containing the Go module to build/test/lint"
        required: true
        type: string

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ${{ inputs.working-directory }}/go.mod
          cache-dependency-path: ${{ inputs.working-directory }}/go.sum

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          working-directory: ${{ inputs.working-directory }}
          args: --config ../../.golangci.yml

      - name: Test
        run: go test ./... -race -count=1

      - name: Build
        run: go build ./...
